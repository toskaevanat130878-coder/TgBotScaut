name: Test Telegram

on:
  workflow_dispatch:

jobs:
  send-test:
    runs-on: ubuntu-latest
    steps:
      - name: Send test message to Telegram
        env:
          TGBOT: ${{ secrets.TGBOT }}
          TGCHAT: ${{ secrets.TGCHAT }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TGBOT}/sendMessage" \
            -d "chat_id=${TGCHAT}" \
            -d "text=Тест: GitHub Actions ↔ Telegram работает. Первое сообщение от бота-скаута."

